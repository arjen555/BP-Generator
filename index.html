<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>BP Generator</title>

  <style>
    body {
      font-family: Arial;
      padding: 30px;
      background: #eef3f8;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: #2c7be5;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>BP Generator</h1>

<input type="file" id="fileInput" multiple>
<br>
<button onclick="generateBP()">Genereer BP</button>

<h2>Sectie 1</h2>
<textarea id="sectie1"></textarea>

<h2>Sectie 2</h2>
<textarea id="sectie2"></textarea>

<h2>Sectie 3</h2>
<textarea id="sectie3"></textarea>

<script>
async function generateBP() {
  const files = document.getElementById("fileInput").files;
  let text = "";

  for (let file of files) {
    text += await file.text();
  }

  try {
    const response = await fetch("https://bp-generator.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const raw = await response.text();
    console.log("RAW RESPONSE:", raw);

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      alert("❌ Server gaf geen geldige JSON terug:\n\n" + raw);
      return;
    }

    document.getElementById("sectie1").value = data.sectie1 || "";
    document.getElementById("sectie2").value = data.sectie2 || "";
    document.getElementById("sectie3").value = data.sectie3 || "";

  } catch (error) {
    alert("❌ Fetch fout: " + error);
  }
}
</script>

</body>
</html>

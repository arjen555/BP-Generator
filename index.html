<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>BP Generator Cluster 1</title>
 <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #eef3f8, #dce6f2);
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
  }

  h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 30px;
  }

  .box {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }

  textarea {
    width: 100%;
    height: 180px;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  button {
    padding: 12px 20px;
    margin-top: 10px;
    background: #2c7be5;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #1a5fd0;
  }

  input {
    margin-top: 10px;
  }
</style>

</head>
<body>

<h1>BP Generator Cluster 1</h1>

<div class="box">
  <h2>Upload document(en)</h2>
  <input type="file" id="fileInput" multiple>
  <br>
  <button onclick="generateBP()">Genereer BP</button>
</div>

<div class="box">
  <h2>Sectie 1</h2>
  <textarea id="sectie1"></textarea>
</div>

<div class="box">
  <h2>Sectie 2</h2>
  <textarea id="sectie2"></textarea>
</div>

<div class="box">
  <h2>Sectie 3</h2>
  <textarea id="sectie3"></textarea>
</div>

<script>
async function generateBP() {
  const files = document.getElementById("fileInput").files;

  let text = "";

  for (let file of files) {
    text += await file.text();  // werkt voor txt/docx (eenvoudig)
  }

  const response = await fetch("https://bp-generator.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await response.json();

  document.getElementById("sectie1").value = data.sectie1;
  document.getElementById("sectie2").value = data.sectie2;
  document.getElementById("sectie3").value = data.sectie3;
}
</script>

</body>
</html>
``
